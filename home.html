<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
  </head>
  <body class="{%bgclass%}">
    <div class="container">
      <div class="glass">
        <h1>Weather Dashboard</h1>
        <form action="/weather" method="GET">
          <input type="search" name="city" placeholder="Search city..." required />
          <button>
            <i class="fa-solid fa-magnifying-glass"></i>
            Search
          </button>
        </form>

        <p class="error">{%error%}</p>

        <div class="weather-card" style="display:{%display%};">
          <img src="https://openweathermap.org/img/wn/{%icon%}@4x.png" class="weather-icon" />

          <h1 class="temperature">{%tempval%}&deg;</h1>

          <h2>{%location%}, {%country%}</h2>

          <p class="description">{%main%} - {%description%}</p>

          <div class="details">
            <div class="detail-box">
              <i class="fa-solid fa-temperature-half"></i>
              <span>Feels Like</span>
              <strong>{%feelslike%}&deg;C</strong>
            </div>

            <div class="detail-box">
              <i class="fa-solid fa-droplet"></i>
              <span>Humidity</span>
              <strong>{%humidity%}%</strong>
            </div>

            <div class="detail-box">
              <i class="fa-solid fa-wind"></i>
              <span>Wind</span>
              <strong>{%wind%} m/s</strong>
            </div>

            <div class="detail-box">
              <i class="fa-solid fa-gauge-high"></i>
              <span>Pressure</span>
              <strong>{%pressure%} hPa</strong>
            </div>
          </div>

          <p id="date"></p>
        </div>
      </div>
    </div>

    <script>
      const curDate = document.getElementById("date");
      let weathercondition = document.getElementById("weathercondition");
      const tempStatus = "{%tempstatus%}";

      const getCurrentDay = () => {
        var weekday = new Array(7);
        weekday[0] = "Sunday";
        weekday[1] = "Monday";
        weekday[2] = "Tuesday";
        weekday[3] = "Wednesday";
        weekday[4] = "Thursday";
        weekday[5] = "Friday";
        weekday[6] = "Saturday";

        let currentTime = new Date();
        let day = weekday[currentTime.getDay()];
        return day;
      };

      const getCurrentTime = () => {
        var months = [
          "Jan",
          "Feb",
          "March",
          "April",
          "May",
          "Jun",
          "July",
          "August",
          "Sept",
          "Oct",
          "Nov",
          "Dec",
        ];
        var now = new Date();
        var year = now.getFullYear();
        var month = months[now.getMonth()];
        var date = now.getDate();

        let hours = now.getHours();
        let mins = now.getMinutes();
        let period = "AM";

        if (hours > 11) {
          period = "PM";
          if (hours > 12) hours -= 12;
        }

        if (mins < 10) {
          mins = "0" + mins;
        }

        return `${date} ${month} ${year} | ${hours}:${mins} ${period}`;
      };
      curDate.innerHTML = getCurrentDay() + " | " + getCurrentTime();
    </script>
  </body>
</html>
